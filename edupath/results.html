<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 분석 결과 - EPIC Profile™ | EPIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Text:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes countUp {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    
    body {
      font-family: 'Times New Roman', 'Malgun Gothic', '맑은 고딕', serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 50%, #d4dce6 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      color: #1a202c;
      line-height: 1.7;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: #2d3748;
      padding: 56px 40px;
      border-radius: 30px;
      text-align: center;
      margin-bottom: 48px;
      box-shadow: 
        0 20px 60px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      animation: fadeInUp 0.8s ease;
      position: relative;
      overflow: hidden;
    }
    
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #1a3a52, #2d4a6a, #46607d, #2d4a6a, #1a3a52);
      background-size: 400% 100%;
      animation: shimmer 3s linear infinite;
    }
    
    .header h1 {
      font-family: 'Times New Roman', '맑은 고딕', serif;
      font-size: 3rem;
      margin-bottom: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #1a3a52 0%, #2d4a6a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .header p {
      font-size: 1.2rem;
      color: #4a5568;
      font-weight: 500;
    }

    .section {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 40px;
      margin-bottom: 32px;
      box-shadow: 
        0 10px 40px rgba(0,0,0,0.15),
        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      animation: fadeInUp 0.8s ease;
    }
    .section-title {
      font-family: 'Times New Roman', '맑은 고딕', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section-icon {
      font-size: 2.5rem;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
    }

    /* Profile Summary */
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 28px;
    }
    .profile-item {
      padding: 24px;
      background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
      border-radius: 16px;
      border-left: 6px solid #2d4a6a;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .profile-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(45, 74, 106, 0.2);
      border-left-width: 8px;
    }
    .profile-label {
      font-size: 0.9rem;
      color: #718096;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .profile-value {
      font-size: 1.2rem;
      color: #2d3748;
      font-weight: 700;
    }

    /* Match Score */
    .match-score {
      text-align: center;
      padding: 48px 40px;
      background: linear-gradient(135deg, #2d4a6a 0%, #1a3a52 50%, #3d5a7a 100%);
      color: white;
      border-radius: 24px;
      margin-bottom: 40px;
      box-shadow: 
        0 20px 60px rgba(45, 74, 106, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.3) inset;
      position: relative;
      overflow: hidden;
    }
    
    .match-score::before {
      content: '✨';
      position: absolute;
      font-size: 15rem;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.1;
    }
    
    .match-score-value {
      font-size: 5.5rem;
      font-weight: 900;
      margin-bottom: 12px;
      text-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      animation: countUp 1s ease;
    }
    .match-score-label {
      font-size: 1.4rem;
      opacity: 0.95;
      font-weight: 600;
    }
    .match-score p {
      position: relative;
      z-index: 1;
    }

    /* School Cards */
    .schools-grid {
      display: grid;
      gap: 32px;
    }
    .school-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 3px solid #e2e8f0;
      border-radius: 24px;
      padding: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }
    
    .school-hero {
      height: 200px;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }
    
    .school-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
    }
    
    .school-hero-name {
      font-family: 'Times New Roman', 'Malgun Gothic', '맑은 고딕', serif;
      position: absolute;
      bottom: 20px;
      left: 24px;
      right: 24px;
      color: white;
      font-size: 2.2rem;
      font-weight: 700;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      z-index: 1;
    }
    
    .school-content {
      padding: 36px;
    }
    
    .school-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #1a3a52, #2d4a6a, #46607d);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
      z-index: 2;
    }
    
    .school-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: #2d4a6a;
      box-shadow: 
        0 25px 70px rgba(45, 74, 106, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.8) inset;
    }
    .school-rank {
      position: absolute;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #2d4a6a 0%, #1a3a52 100%);
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.6rem;
      box-shadow: 0 8px 25px rgba(45, 74, 106, 0.4);
      z-index: 2;
    }
    .school-header {
      margin-bottom: 24px;
    }
    .school-name {
      font-family: 'Times New Roman', 'Malgun Gothic', '맑은 고딕', serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 10px;
    }
    .school-location {
      color: #718096;
      font-size: 1.05rem;
      font-weight: 500;
    }
    .school-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    .stat-item {
      text-align: center;
      padding: 16px;
      background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
      border-radius: 12px;
      transition: all 0.3s;
    }
    .stat-item:hover {
      background: linear-gradient(135deg, #e6f0f7 0%, #d6e4f0 100%);
      transform: scale(1.05);
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #2d4a6a 0%, #1a3a52 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
    }
    .stat-label {
      font-size: 0.9rem;
      color: #4a5568;
      margin-top: 6px;
      font-weight: 600;
    }
    .school-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }
    .tag {
      padding: 8px 16px;
      background: linear-gradient(135deg, #edf2f7 0%, #e2e8f0 100%);
      color: #4a5568;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 700;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .tag:hover {
      background: linear-gradient(135deg, #2d4a6a 0%, #1a3a52 100%);
      color: white;
      transform: scale(1.05);
    }
    .school-actions {
      display: flex;
      gap: 14px;
    }
    .btn {
      flex: 1;
      padding: 14px 28px;
      border: none;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-decoration: none;
      text-align: center;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .btn-primary {
      background: linear-gradient(135deg, #2d4a6a 0%, #1a3a52 100%);
      color: white;
      box-shadow: 0 6px 20px rgba(45, 74, 106, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 10px 30px rgba(45, 74, 106, 0.5);
    }
    .btn-secondary {
      background: rgba(226, 232, 240, 0.9);
      color: #4a5568;
    }
    .btn-secondary:hover {
      background: rgba(203, 213, 224, 1);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    /* Action Buttons */
    .cta-section {
      text-align: center;
      padding: 56px 40px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: #2d3748;
      border-radius: 30px;
      margin-top: 48px;
      box-shadow: 
        0 20px 60px rgba(0,0,0,0.2),
        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      animation: fadeInUp 0.8s ease 0.4s backwards;
    }
    .cta-section h2 {
      font-family: 'Times New Roman', '맑은 고딕', serif;
      font-size: 2.5rem;
      margin-bottom: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #1a3a52 0%, #2d4a6a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .cta-section p {
      font-size: 1.2rem;
      margin-bottom: 36px;
      color: #4a5568;
    }
    .cta-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .cta-btn {
      padding: 18px 48px;
      background: linear-gradient(135deg, #2d4a6a 0%, #1a3a52 100%);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: 700;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: inline-block;
      box-shadow: 
        0 10px 35px rgba(45, 74, 106, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.3) inset;
    }
    .cta-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 
        0 20px 50px rgba(45, 74, 106, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
    }

    @media (max-width: 768px) {
      body { padding: 20px 10px; }
      .header {
        padding: 40px 28px;
      }
      .header h1 { font-size: 2.2rem; }
      .section-title { font-size: 1.6rem; }
      .match-score-value { font-size: 4rem; }
      .cta-buttons {
        flex-direction: column;
      }
      .cta-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎯 EPIC Profile™ 분석 완료!</h1>
      <p>당신만의 맞춤형 유학 로드맵이 준비되었습니다</p>
    </div>

    <!-- Profile Summary -->
    <div class="section">
      <h2 class="section-title">
        <span class="section-icon">👤</span>
        학생 프로파일 요약
      </h2>
      <div class="profile-grid" id="profileGrid"></div>
    </div>

    <!-- Match Analysis -->
    <div class="section">
      <h2 class="section-title">
        <span class="section-icon">🎯</span>
        AI 매칭 분석
      </h2>
      <div class="match-score">
        <div class="match-score-value" id="matchScore">85%</div>
        <div class="match-score-label">합격 가능성 예측</div>
        <p style="margin-top: 16px; font-size: 1rem; opacity: 0.9;">
          현재 프로파일을 기반으로 추천 학교들의 평균 합격 가능성입니다
        </p>
      </div>
    </div>

    <!-- Recommended Schools -->
    <div class="section">
      <h2 class="section-title">
        <span class="section-icon">🏫</span>
        맞춤 학교 추천 (Top 5)
      </h2>
      <div class="schools-grid" id="schoolsGrid"></div>
    </div>

    <!-- CTA Section -->
    <div class="cta-section">
      <h2>다음 단계로 넘어가세요</h2>
      <p>Timeline 120™과 Value-View™으로 구체적인 계획을 세워보세요</p>
      <div class="cta-buttons">
        <a href="roadmap.html" class="cta-btn">⏱️ Timeline 120™ 보기</a>
        <a href="budget.html" class="cta-btn">💎 Value-View™ 보기</a>
      </div>
    </div>
  </div>

  <script>
    // Load profile data
    let profileData = JSON.parse(localStorage.getItem('edupath_profile') || '{}');
    
    // 데이터가 없으면 샘플 데이터 사용
    if (Object.keys(profileData).length === 0) {
      profileData = {
        q1: 'high_late',
        q2: 'usa',
        q3: 'advanced',
        q4: 'top5',
        q5: '50to80m',
        q6: 'engineering',
        q7: 'outgoing',
        q7_mbti: 'ENTJ',
        q7_blood: 'A',
        q7_zodiac: 'leo'
      };
    }

    // Profile labels
    const profileLabels = {
      q1: { label: '학교급', values: {
        elementary: '초등 4~6학년',
        middle: '중학교 1~3학년',
        high_early: '고등학교 1학년',
        high_late: '고등학교 2~3학년'
      }},
      q2: { label: '목표 국가', values: {
        usa: '🇺🇸 미국', uk: '🇬🇧 영국', canada: '🇨🇦 캐나다',
        australia: '🇦🇺 호주', singapore: '🇸🇬 싱가포르'
      }},
      q3: { label: '영어 수준', values: {
        beginner: '기초', intermediate: '중급',
        advanced: '고급', native: '원어민 수준'
      }},
      q4: { label: '내신 성적', values: {
        top5: '상위 5%', top20: '상위 5~20%',
        top50: '상위 20~50%', below50: '상위 50% 이하'
      }},
      q5: { label: '연간 예산', values: {
        under50m: '5천만원 미만', '50to80m': '5천~8천만원',
        '80to1b': '8천만원~1억원', over1b: '1억원 이상'
      }},
      q6: { label: '희망 전공', values: {
        business: '💼 경영/경제', engineering: '⚙️ 공학/컴퓨터',
        science: '🔬 자연과학/의학', humanities: '📚 인문/사회',
        arts: '🎨 예체능', undecided: '미정'
      }},
      q7: { label: '기본 성향', values: {
        outgoing: '외향적·사교적', balanced: '균형잡힌 성격', 
        introverted: '내향적·집중형'
      }},
      q7_mbti: { label: 'MBTI', values: {
        ISTJ: 'ISTJ - 논리주의자', ISFJ: 'ISFJ - 수호자',
        INFJ: 'INFJ - 옹호자', INTJ: 'INTJ - 건축가',
        ISTP: 'ISTP - 장인', ISFP: 'ISFP - 모험가',
        INFP: 'INFP - 중재자', INTP: 'INTP - 논리술사',
        ESTP: 'ESTP - 사업가', ESFP: 'ESFP - 연예인',
        ENFP: 'ENFP - 활동가', ENTP: 'ENTP - 변론가',
        ESTJ: 'ESTJ - 경영자', ESFJ: 'ESFJ - 집정관',
        ENFJ: 'ENFJ - 선도자', ENTJ: 'ENTJ - 통솔자',
        unknown: '미입력'
      }},
      q7_blood: { label: '혈액형', values: {
        A: 'A형', B: 'B형', O: 'O형', AB: 'AB형', unknown: '미입력'
      }},
      q7_zodiac: { label: '별자리', values: {
        aries: '♈ 양자리', taurus: '♉ 황소자리',
        gemini: '♊ 쌍둥이자리', cancer: '♋ 게자리',
        leo: '♌ 사자자리', virgo: '♍ 처녀자리',
        libra: '♎ 천칭자리', scorpio: '♏ 전갈자리',
        sagittarius: '♐ 사수자리', capricorn: '♑ 염소자리',
        aquarius: '♒ 물병자리', pisces: '♓ 물고기자리',
        unknown: '미입력'
      }}
    };

    // Render profile summary
    const profileGrid = document.getElementById('profileGrid');
    ['q1', 'q2', 'q3', 'q4', 'q5', 'q6', 'q7', 'q7_mbti', 'q7_blood', 'q7_zodiac'].forEach(key => {
      const item = profileLabels[key];
      let value = profileData[key];
      
      if (Array.isArray(value)) {
        value = value.map(v => item.values[v]).join(', ');
      } else {
        value = item.values[value] || value || 'N/A';
      }

      profileGrid.innerHTML += `
        <div class="profile-item">
          <div class="profile-label">${item.label}</div>
          <div class="profile-value">${value}</div>
        </div>
      `;
    });

    // 국가별 대학 Pool
    const schoolsByCountry = {
      usa: [
        {
          name: 'Stanford University',
          location: 'California, USA',
          matchRate: 88,
          tuition: '₩8,500만/년',
          acceptance: '4.3%',
          employment: '95%',
          tags: ['공학 특화', '실리콘밸리', '창업 지원'],
          description: '학생의 공학·혁신 지향 성향과 완벽히 매칭됩니다.',
          image: 'https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=800&q=80'
        },
        {
          name: 'MIT',
          location: 'Massachusetts, USA',
          matchRate: 85,
          tuition: '₩8,800만/년',
          acceptance: '3.9%',
          employment: '96%',
          tags: ['STEM 최강', '연구 중심', '혁신 문화'],
          description: '수학·과학 우수 학생에게 최적의 환경을 제공합니다.',
          image: 'https://images.unsplash.com/photo-1564981797816-1043664bf78d?w=800&q=80'
        },
        {
          name: 'UC Berkeley',
          location: 'California, USA',
          matchRate: 82,
          tuition: '₩6,200만/년',
          acceptance: '14.5%',
