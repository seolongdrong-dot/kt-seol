<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>원어민 영어 통암기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px;
      color: white;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #e2b96f;
      letter-spacing: 1px;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 30px;
    }
    .progress-bar-wrap {
      width: 100%;
      max-width: 600px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      height: 8px;
      margin-bottom: 20px;
    }
    .progress-bar {
      height: 8px;
      background: #e2b96f;
      border-radius: 20px;
      transition: width 0.4s;
    }
    .counter {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 20px;
    }

    /* 카드 */
    .card {
      width: 100%;
      max-width: 600px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      position: relative;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }
    .category {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #e2b96f;
      font-weight: 600;
    }
    .korean {
      font-size: 1.1rem;
      color: #ddd;
      line-height: 1.6;
    }
    .english {
      font-size: 1.25rem;
      font-weight: 600;
      color: white;
      line-height: 1.6;
      transition: opacity 0.3s;
    }
    .english.hidden {
      opacity: 0;
      user-select: none;
    }
    .pronunciation {
      font-size: 0.85rem;
      color: #88b4e7;
      font-style: italic;
    }
    .pronunciation.hidden { opacity: 0; }

    /* 버튼 */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 12px 28px;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.97); }
    .btn-reveal {
      background: #e2b96f;
      color: #1a1a2e;
    }
    .btn-prev { background: rgba(255,255,255,0.1); color: white; }
    .btn-next { background: #4a90d9; color: white; }

    /* 모드 전환 */
    .mode-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .mode-btn {
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
    }
    .mode-btn.active {
      background: #e2b96f;
      color: #1a1a2e;
      border-color: #e2b96f;
    }

    /* 퀴즈 모드 */
    .quiz-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 1rem;
      outline: none;
      margin-top: 8px;
    }
    .quiz-input::placeholder { color: #888; }
    .quiz-result {
      font-size: 0.95rem;
      min-height: 24px;
      margin-top: 4px;
    }
    .correct { color: #6fcf97; }
    .wrong { color: #eb5757; }

    /* 전체 목록 */
    .list-wrap {
      width: 100%;
      max-width: 600px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .list-item {
      background: rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .list-num {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e2b96f;
      min-width: 28px;
    }
    .list-text .en { font-size: 1rem; font-weight: 600; }
    .list-text .ko { font-size: 0.85rem; color: #aaa; margin-top: 4px; }
    .list-text .pr { font-size: 0.8rem; color: #88b4e7; font-style: italic; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>원어민 영어 통암기</h1>
  <p class="subtitle">10문장으로 배우는 네이티브 표현</p>

  <div class="mode-row">
    <button class="mode-btn active" onclick="setMode('card')">카드학습</button>
    <button class="mode-btn" onclick="setMode('quiz')">받아쓰기</button>
    <button class="mode-btn" onclick="setMode('list')">전체보기</button>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="counter" id="counter"></div>

  <!-- 카드 모드 -->
  <div class="card" id="cardView">
    <div class="category" id="cardCategory"></div>
    <div class="korean" id="cardKorean"></div>
    <div class="english" id="cardEnglish"></div>
    <div class="pronunciation" id="cardPron"></div>
    <div class="quiz-result" id="quizResult"></div>
    <input class="quiz-input" id="quizInput" placeholder="영어 문장을 입력하세요..." style="display:none" onkeydown="handleEnter(event)" />
  </div>

  <div class="btn-row" id="btnRow">
    <button class="btn-prev" onclick="move(-1)">◀ 이전</button>
    <button class="btn-reveal" id="revealBtn" onclick="reveal()">정답 보기</button>
    <button class="btn-next" onclick="move(1)">다음 ▶</button>
  </div>

  <!-- 전체 목록 -->
  <div class="list-wrap" id="listView"></div>

  <script>
    const sentences = [
      {
        en: "I was just about to call you.",
        ko: "막 전화하려던 참이었어.",
        pr: "[아이 워즈 저스트 어바웃 투 콜 유]",
        cat: "일상 회화"
      },
      {
        en: "It's not my place to say.",
        ko: "내가 말할 입장이 아니야.",
        pr: "[잇츠 낫 마이 플레이스 투 세이]",
        cat: "겸손·배려"
      },
      {
        en: "That's easier said than done.",
        ko: "말이야 쉽지.",
        pr: "[댓츠 이지어 세드 댄 던]",
        cat: "관용 표현"
      },
      {
        en: "I'll keep that in mind.",
        ko: "명심할게요.",
        pr: "[아일 킵 댓 인 마인드]",
        cat: "비즈니스"
      },
      {
        en: "We're on the same page.",
        ko: "우리 생각이 같네요.",
        pr: "[위어 온 더 세임 페이지]",
        cat: "비즈니스"
      },
      {
        en: "Don't take it personally.",
        ko: "개인적으로 받아들이지 마.",
        pr: "[돈트 테이크 잇 퍼스널리]",
        cat: "감정 표현"
      },
      {
        en: "It slipped my mind.",
        ko: "깜빡했어.",
        pr: "[잇 슬립트 마이 마인드]",
        cat: "관용 표현"
      },
      {
        en: "Let's call it a day.",
        ko: "오늘은 여기서 마무리하자.",
        pr: "[렛츠 콜 잇 어 데이]",
        cat: "직장·일상"
      },
      {
        en: "I can't help but laugh.",
        ko: "웃지 않을 수가 없어.",
        pr: "[아이 캔트 헬프 벗 래프]",
        cat: "감정 표현"
      },
      {
        en: "You can say that again.",
        ko: "정말 그 말이 맞아. / 완전 동의해.",
        pr: "[유 캔 세이 댓 어게인]",
        cat: "공감 표현"
      }
    ];

    let current = 0;
    let mode = 'card'; // card | quiz | list
    let revealed = false;

    function setMode(m) {
      mode = m;
      document.querySelectorAll('.mode-btn').forEach((b, i) => {
        b.classList.toggle('active', ['card','quiz','list'][i] === m);
      });
      document.getElementById('listView').style.display = m === 'list' ? 'flex' : 'none';
      document.getElementById('cardView').style.display = m !== 'list' ? 'flex' : 'none';
      document.getElementById('btnRow').style.display = m !== 'list' ? 'flex' : 'none';
      document.getElementById('progressBar').parentElement.style.display = m !== 'list' ? 'block' : 'none';
      document.getElementById('counter').style.display = m !== 'list' ? 'block' : 'none';

      if (m === 'list') buildList();
      else render();
    }

    function render() {
      const s = sentences[current];
      revealed = false;

      document.getElementById('progressBar').style.width = ((current + 1) / sentences.length * 100) + '%';
      document.getElementById('counter').textContent = `${current + 1} / ${sentences.length}`;
      document.getElementById('cardCategory').textContent = s.cat;
      document.getElementById('cardKorean').textContent = s.ko;
      document.getElementById('cardPron').textContent = s.pr;

      const engEl = document.getElementById('cardEnglish');
      const pronEl = document.getElementById('cardPron');
      const quizInput = document.getElementById('quizInput');
      const quizResult = document.getElementById('quizResult');
      const revealBtn = document.getElementById('revealBtn');

      quizResult.textContent = '';
      quizInput.value = '';

      if (mode === 'card') {
        engEl.textContent = s.en;
        engEl.className = 'english hidden';
        pronEl.className = 'pronunciation hidden';
        quizInput.style.display = 'none';
        revealBtn.style.display = 'inline-block';
        revealBtn.textContent = '정답 보기';
      } else if (mode === 'quiz') {
        engEl.textContent = s.en;
        engEl.className = 'english hidden';
        pronEl.className = 'pronunciation hidden';
        quizInput.style.display = 'block';
        revealBtn.style.display = 'inline-block';
        revealBtn.textContent = '채점';
        setTimeout(() => quizInput.focus(), 100);
      }
    }

    function reveal() {
      const engEl = document.getElementById('cardEnglish');
      const pronEl = document.getElementById('cardPron');

      if (mode === 'card') {
        engEl.className = 'english';
        pronEl.className = 'pronunciation';
        document.getElementById('revealBtn').textContent = '✓ 확인됨';
      } else if (mode === 'quiz') {
        const input = document.getElementById('quizInput').value.trim();
        const answer = sentences[current].en;
        const resultEl = document.getElementById('quizResult');
        const normalize = s => s.toLowerCase().replace(/[^a-z0-9\s']/g, '').trim();
        if (normalize(input) === normalize(answer)) {
          resultEl.className = 'quiz-result correct';
          resultEl.textContent = '✅ 정답입니다!';
        } else {
          resultEl.className = 'quiz-result wrong';
          resultEl.textContent = `❌ 정답: ${answer}`;
        }
        engEl.className = 'english';
        pronEl.className = 'pronunciation';
      }
    }

    function handleEnter(e) {
      if (e.key === 'Enter') reveal();
    }

    function move(dir) {
      current = (current + dir + sentences.length) % sentences.length;
      render();
    }

    function buildList() {
      const wrap = document.getElementById('listView');
      wrap.innerHTML = sentences.map((s, i) => `
        <div class="list-item">
          <div class="list-num">${i + 1}</div>
          <div class="list-text">
            <div class="en">${s.en}</div>
            <div class="ko">${s.ko}</div>
            <div class="pr">${s.pr}</div>
          </div>
        </div>
      `).join('');
    }

    render();
  </script>
</body>
</html>
